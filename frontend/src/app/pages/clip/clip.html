<div class="clip-page-container">
  <div class="clip-page-title-container">
    @if (clip()) {
      <h1>{{ clip()?.title }}</h1>
      <button class="title-edit-button" (click)="onEditTitle()" title="Edit title">
        <span class="edit-icon">✏️</span>
      </button>
    } @else {
      <h1>Clip {{ clipId }}</h1>
    }
  </div>
  
  <!-- Video Section -->
  <div class="video-section">
    <div class="video-wrapper">
      <app-video-player [clipId]="clipId"></app-video-player>
    </div>
    <div class="video-footer">
      @if (clip()?.description) {
        <p class="video-description">{{ clip()?.description }}</p>
      } @else {
        <p class="video-description">No description</p>
      }
      <button 
        class="video-like-btn" 
        (click)="onLikeClip()" 
        [class.active]="clip()?.user_has_liked"
        [disabled]="!authService.isAuthenticated()"
      >
        <span class="icon">👍</span> {{ clip()?.likes }}
      </button>
    </div>
  </div>

  <!-- Comments section -->
  <app-comments-section [clipId]="clipId"></app-comments-section>
</div>
